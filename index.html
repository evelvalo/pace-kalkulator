<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pace Kalkulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f8ff;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}

h1 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

#result {
    margin-top: 15px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Pace Kalkulator</h1>
    <p>Fyll inn minst to felt</p>

    <label>Distanse (km)</label>
    <input type="number" id="distance" step="0.01">

    <label>Tid (minutter)</label>
    <input type="number" id="time" step="0.01">

    <label>Pace (min/km)</label>
    <input type="text" id="pace" placeholder="f.eks 4:48">

    <label>Fart (km/t)</label>
    <input type="number" id="speed" step="0.01">

    <div id="result"></div>
</div>

<script>

// --- Hjelpefunksjoner ---

function parsePace(str) {
    if (!str) return null;

    if (str.includes(":")) {
        let [min, sec] = str.split(":").map(Number);
        if (isNaN(min) || isNaN(sec)) return null;
        return min + (sec / 60);
    }

    let val = parseFloat(str);
    return isNaN(val) ? null : val;
}

function formatPace(minPerKm) {
    let min = Math.floor(minPerKm);
    let sec = Math.round((minPerKm - min) * 60);

    if (sec === 60) {
        min += 1;
        sec = 0;
    }

    return `${min}:${sec.toString().padStart(2,'0')}`;
}

// --- Hovedlogikk ---

function calculate() {
    let d = parseFloat(distance.value);
    let t = parseFloat(time.value);
    let p = parsePace(pace.value);
    let s = parseFloat(speed.value);

    let filled = [d, t, p, s].filter(v => v !== null && !isNaN(v)).length;

    if (filled < 2) {
        result.innerText = "";
        return;
    }

    // Distanse + tid
    if (d && t) {
        let paceVal = t / d;
        let speedVal = d / (t / 60);

        pace.value = formatPace(paceVal);
        speed.value = speedVal.toFixed(2);
    }

    // Distanse + pace
    else if (d && p) {
        let timeVal = p * d;
        let speedVal = d / (timeVal / 60);

        time.value = timeVal.toFixed(2);
        speed.value = speedVal.toFixed(2);
        pace.value = formatPace(p);
    }

    // Distanse + fart
    else if (d && s) {
        let timeVal = (d / s) * 60;
        let paceVal = timeVal / d;

        time.value = timeVal.toFixed(2);
        pace.value = formatPace(paceVal);
    }

    result.innerText = "Oppdatert ✔️";
}

// --- Live oppdatering ---
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", calculate);
});

</script>

</body>
</html>
