<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pace Kalkulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f8ff;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}

h1 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

.calculate {
    background: #007BFF;
    color: white;
}

.reset {
    background: #ccc;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Pace Kalkulator</h1>
    <p>Fyll inn minst to felt</p>

    <label>Distanse (km)</label>
    <input type="number" id="distance" step="0.01">

    <label>Tid (minutter)</label>
    <input type="number" id="time" step="0.01">

    <label>Pace (min/km)</label>
    <input type="text" id="pace" placeholder="f.eks 4:48">

    <label>Fart (km/t)</label>
    <input type="number" id="speed" step="0.01">

    <button class="calculate" onclick="calculate()">Beregn</button>
    <button class="reset" onclick="resetFields()">Nullstill</button>

    <div id="result"></div>
</div>

<script>

// --- Hjelpefunksjoner ---

function parsePace(str) {
    if (!str) return null;

    if (str.includes(":")) {
        let parts = str.split(":");
        let min = parseInt(parts[0]);
        let sec = parseInt(parts[1]);

        if (isNaN(min) || isNaN(sec)) return null;

        return min + (sec / 60);
    }

    let val = parseFloat(str);
    return isNaN(val) ? null : val;
}

function formatPace(val) {
    let min = Math.floor(val);
    let sec = Math.round((val - min) * 60);

    if (sec === 60) {
        min++;
        sec = 0;
    }

    return `${min}:${sec.toString().padStart(2,'0')}`;
}

// --- Hovedfunksjon ---

function calculate() {
    let d = parseFloat(document.getElementById("distance").value);
    let t = parseFloat(document.getElementById("time").value);
    let p = parsePace(document.getElementById("pace").value);
    let s = parseFloat(document.getElementById("speed").value);

    let resultText = "";

    if (d && t) {
        let paceVal = t / d;
        let speedVal = d / (t / 60);

        resultText = `Pace: ${formatPace(paceVal)} min/km | Fart: ${speedVal.toFixed(2)} km/t`;
    }

    else if (d && p) {
        let timeVal = p * d;
        let speedVal = d / (timeVal / 60);

        resultText = `Tid: ${timeVal.toFixed(2)} min | Fart: ${speedVal.toFixed(2)} km/t`;
    }

    else if (d && s) {
        let timeVal = (d / s) * 60;
        let paceVal = timeVal / d;

        resultText = `Tid: ${timeVal.toFixed(2)} min | Pace: ${formatPace(paceVal)} min/km`;
    }

    else {
        resultText = "Fyll inn minst to verdier";
    }

    document.getElementById("result").innerText = resultText;
}

// --- Nullstill ---

function resetFields() {
    document.getElementById("distance").value = "";
    document.getElementById("time").value = "";
    document.getElementById("pace").value = "";
    document.getElementById("speed").value = "";
    document.getElementById("result").innerText = "";
}

</script>

</body>
</html>
